# =============================================================================
# Strategy 1 — Dr.GRPO RLVR on a non-saturated base (API-free, teacher-free).
# =============================================================================
# This file is the single source of truth for the staged Strategy-1 plan.
# Values map 1:1 to the CLI args of:
#   * Dr.GRPO RL : python -m adaptivethink.rl.drgrpo_train
# run.sh reads model/datasets/seeds/steps from here; per-flag tuning lives below.
#
# Target framing (Meta Advice):
#   IMPROVE  -> GSM8K, StrategyQA, AQuA-RAT  (rule-based exact-match reward)
#   MAINTAIN -> MMLU                         (knowledge MC; eval-only, NEVER trained)
#   Always report the SAME lm-eval harness config for baseline AND trained model,
#   and report MULTI-SEED runs with confidence intervals (RL is high-variance).
#
# HARD RULES (interface contract):
#   * Never train on any MMLU split or any test split.
#   * No teacher API anywhere — reward is pure RLVR (exact-match) and the
#     curriculum signal (CCDD) comes from the base model's OWN solve-rate.
# =============================================================================

# ── model ─────────────────────────────────────────────────────────────────────
# Default base is the non-saturated Qwen2.5-1.5B-Instruct. 3B / 7B are one-flag
# switches (--model on the CLI overrides this): all Qwen2.5 share ChatML + the
# same 7 LoRA modules (q/k/v/o/gate/up/down_proj). Do NOT hardcode DeepSeek.
model: Qwen/Qwen2.5-1.5B-Instruct

# ── benchmarks ──────────────────────────────────────────────────────────────--
# Train pool ~6.1k rows, mixed 45/30/25 across the three IMPROVE datasets:
#   gsm8k (45%) / strategyqa (30%) / aqua (25%).
datasets: gsm8k,strategyqa,aqua     # the three IMPROVE targets (drgrpo --datasets)
maintain_benchmark: mmlu            # eval-only; NEVER trained on

# ── reproducibility ─────────────────────────────────────────────────────────--
train_seeds: [0]                    # single train seed (24h budget)
eval_seeds: [0, 1, 2]              # eval all 3 for confidence intervals

# =============================================================================
# CCDD — Curriculum from the model's OWN difficulty (the API-free novelty).
# =============================================================================
# difficulty = 1 - (base model's empirical solve-rate over K rollouts per item).
# A separate self-difficulty pass writes data/self_difficulty.jsonl with rows
#   {question, answer, difficulty}
# using the SAME verifier the reward uses. The curriculum filter drops pool items
# whose solve_rate is 0.0 (unsolvable) or 1.0 (trivial) — both give zero-advantage
# GRPO groups. When self_difficulty_file is unset, training uses the full pool.
self_difficulty_file: data/self_difficulty.jsonl

# =============================================================================
# Dr.GRPO RL — the accuracy core. 24h config.
# Maps to: python -m adaptivethink.rl.drgrpo_train
# Knobs map VERBATIM to TRL GRPOConfig (ALGO research).
# =============================================================================
grpo:
  out: outputs/grpo                 # run.sh appends -seed<S>
  steps: 400                        # 24h budget
  group_size: 8                     # num_generations G (effective batch must divide by it)

  # (a) Dr.GRPO bias fix — BOTH knobs needed for the full fix:
  loss: dr_grpo                     # loss_type: constant 1/(L*G) denom (kills length bias)
                                    # scale_rewards=False is hard-set in the trainer
                                    # (kills per-group std / difficulty bias).

  # (c) KL: 0.0 => no ref model loaded (saves memory). Ablation favors no-KL for tiny models.
  kl_beta: 0.0                      # GRPOConfig beta.

  # (b) Clip-Higher: OFF for tiny models (ablation: hurts) AND inert at on-policy mu=1.
  clip_higher: false                # --clip-higher sets epsilon_high=0.28

  # (d) Entropy: TRL has NO additive bonus. This is top_entropy_quantile (token-mask).
  entropy: 1.0                      # 1.0 = train on ALL tokens; do NOT lower for tiny models

  one_shot: false                   # true => 1 item/dataset (smoke)

  # seq-len budget (Dr.GRPO 24h config)
  max_prompt_length: 512            # GRPOConfig max_prompt_length
  max_completion_length: 1024       # GRPOConfig max_completion_length (also the 1/L constant)

  # optimisation / hygiene
  lr: 1.0e-6                        # small LR for RL
  batch: 8                          # per_device_train_batch_size
  grad_accum: 4                     # gradient_accumulation_steps
  lora_r: 16
  lora_alpha: 32
  save_steps: 50

  # Reward composition (set in trainer; documented here):
  #   reward_funcs = [correctness (exact-match, weight 1.0),
  #                   format     (<think>...</think><answer>...</answer>, weight 0.2)]
  # Correctness REUSES src/adaptivethink/router/reward.py extract_answer +
  # _answers_match (numeric/boolean/letter/fraction tolerant). No teacher API.
  reward_weights: [1.0, 0.2]

# =============================================================================
# Hardware target: single Linux GPU, CUDA 12.x, ~50 GB VRAM.
#   vLLM colocated rollouts auto-enable at >= 22 GB (trainer VLLM_VRAM_GB).
#   QLoRA 4-bit + gradient checkpointing keep sub-3B comfortably in budget.
# =============================================================================
