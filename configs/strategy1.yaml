# =============================================================================
# Strategy 1 — Distillation cold-start + Dr.GRPO RLVR on a non-saturated base.
# =============================================================================
# This file is the single source of truth for the staged Strategy-1 plan
# (new.md Strategy 1 + Strategy 6). Values map 1:1 to the CLI args of:
#   * SFT cold-start : python -m adaptivethink.rl.sft_coldstart
#   * Dr.GRPO RL     : python -m adaptivethink.rl.drgrpo_train
# run.sh reads model/datasets/seeds/steps from here; per-flag tuning lives below.
#
# Target framing (new.md Meta Advice):
#   IMPROVE  -> GSM8K, StrategyQA   (rule-based exact-match reward; headroom for +5%)
#   MAINTAIN -> MMLU                (knowledge MC; RL on math reasoning barely moves it)
#   Always report the SAME lm-eval harness config for baseline AND trained model,
#   and report MULTI-SEED runs with confidence intervals (RL is high-variance).
# =============================================================================

# ── model ─────────────────────────────────────────────────────────────────────
# Primary base is the non-saturated Qwen2.5-3B-Instruct (NOT the math-distilled
# DeepSeek distill). Fallback to 1.5B-Instruct if 3B baseline GSM8K is too high
# (>80% leaves no headroom) or VRAM is tight (--model on the CLI overrides this).
model: Qwen/Qwen2.5-3B-Instruct
fallback_model: Qwen/Qwen2.5-1.5B-Instruct

# ── benchmarks ──────────────────────────────────────────────────────────────--
datasets: gsm8k,strategyqa          # the two IMPROVE targets (drgrpo --datasets)
maintain_benchmark: mmlu            # eval-only; not trained on

# ── reproducibility ─────────────────────────────────────────────────────────--
seeds: [0, 1, 2]                    # run all 3 for confidence intervals
max_seq_len: 2048                   # RL seq budget (prompt + completion caps)

# =============================================================================
# Stage A — SFT cold-start (Day 3-5). Installs the <think>/<answer> format.
# Maps to: python -m adaptivethink.rl.sft_coldstart
# =============================================================================
sft:
  enabled: true                     # set false to RL directly from the base
  traces: simplescaling/s1K-1.1     # DeepSeek-R1 traces (deepseek_thinking_trajectory
                                    # / deepseek_attempt). ~1k rows, right-sized.
  config: null                      # dataset config; e.g. "default" for OpenR1/OpenThoughts
  split: train
  out: outputs/sft
  steps: 500                        # SHORT cold-start (<=0 => use epochs instead)
  epochs: 1.0                       # used only when steps <= 0
  max_examples: 4000                # cap for a short cold-start (DATA research: 1-4k)
  max_seq_len: 4096                 # longer than RL: R1 traces are verbose
  lr: 2.0e-4                        # QLoRA SFT LR
  lora_rank: 32
  batch: 1
  grad_accum: 8
  validate_answers: false          # drop traces whose <answer> != gold (router.reward matcher)
  # Alternative right-sized trace sources (swap into `traces`):
  #   open-r1/OpenR1-Math-220k        (config: default ~93.7k; subsample via max_examples)
  #   open-thoughts/OpenThoughts-114k (config: default — ShareGPT chat; R1 traces)

# =============================================================================
# Stage B — Dr.GRPO RL (Day 5-8). The accuracy core.
# Maps to: python -m adaptivethink.rl.drgrpo_train
# Knobs map VERBATIM to TRL 0.29.1 GRPOConfig (ALGO research).
# =============================================================================
grpo:
  out: outputs/grpo                 # run.sh appends -seed<S>
  steps: 1500                       # ~1-1.5k steps (DeepScaleR-scale)
  group_size: 8                     # num_generations G (effective batch must divide by it)

  # (a) Dr.GRPO bias fix — BOTH knobs needed for the full fix:
  loss: dr_grpo                     # loss_type: constant 1/(L*G) denom (kills length bias)
                                    # scale_rewards=False is hard-set in the trainer
                                    # (kills per-group std / difficulty bias).

  # (c) KL: 0.0 => no ref model loaded (saves memory). Ablation favors no-KL for tiny models.
  kl: 0.0                           # GRPOConfig beta. (Day 6-8: also try 1.0e-3 per DeepSeek-R1.)

  # (b) Clip-Higher: OFF for tiny models (ablation: hurts) AND inert at on-policy mu=1.
  clip_higher: false                # --clip-higher sets epsilon_high=0.28

  # (d) Entropy: TRL has NO additive bonus. This is top_entropy_quantile (token-mask).
  entropy: 1.0                      # 1.0 = train on ALL tokens; do NOT lower for tiny models

  # Difficulty filter: offline, drop base-unsolvable (p_solve==0) and trivial (==1) items.
  difficulty_filter: false          # turn on in Day 6-8 if frac_reward_zero_std is high
  difficulty_k: 8                   # base-model samples per item to estimate pass-rate

  one_shot: false                   # true => 1 item/dataset (Strategy 3 flex / smoke)

  # optimisation / hygiene
  lr: 1.0e-6                        # GRPOConfig default; small LR for RL
  batch: 8                          # per_device_train_batch_size
  grad_accum: 4                     # gradient_accumulation_steps
  lora_r: 16
  lora_alpha: 32
  save_steps: 50

  # Reward composition (set in trainer; documented here):
  #   reward_funcs = [correctness (exact-match, weight 1.0),
  #                   format     (<think>...</think><answer>...</answer>, weight 0.2)]
  # Keep format weight SMALL so correctness cannot be gamed.
  reward_weights: [1.0, 0.2]

# =============================================================================
# Hardware target: single Linux GPU, CUDA 12.x, ~50 GB VRAM.
#   vLLM colocated rollouts auto-enable at >= 22 GB (trainer VLLM_VRAM_GB).
#   QLoRA 4-bit + gradient checkpointing keep sub-3B comfortably in budget.
# =============================================================================
